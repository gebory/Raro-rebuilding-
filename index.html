<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RARO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#d4b06a;
font-family:Arial,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:700px;
padding:40px;
text-align:center;
}

.mark{
width:140px;
height:140px;
margin:0 auto 40px auto;
border:1px solid rgba(212,176,106,.15);
display:flex;
justify-content:center;
align-items:center;
}

.logo{
font-size:80px;
letter-spacing:15px;
font-weight:300;
margin-bottom:40px;
}

.archive{
font-size:18px;
letter-spacing:8px;
margin-bottom:60px;
}

.description{
color:#d8d0c5;
font-size:18px;
line-height:2;
margin-bottom:60px;
}

.enter{
display:block;
width:100%;
padding:28px;
border:1px solid #b08d57;
color:#b08d57;
text-decoration:none;
letter-spacing:8px;
font-size:18px;
margin-bottom:100px;
}

.nav{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-bottom:40px;
}

.nav a{
color:#b08d57;
text-decoration:none;
letter-spacing:6px;
font-size:16px;
}

.instagram a{
color:#b08d57;
text-decoration:none;
letter-spacing:6px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="mark">
MARK
</div>

<div class="logo">
RARO
</div>

<div class="archive">
ARCHIVE OF MARKS
</div>

<div class="description">
Every piece begins as an idea.
<br><br>
Before it becomes a garment.
</div>

<a href="#" class="enter">
ENTER THE ARCHIVE
</a>

<div class="nav">
<a href="#">ARCHIVE</a>
<a href="#">ABOUT</a>
<a href="#">WAITLIST</a>
</div>

<div class="instagram">
<a href="#">INSTAGRAM</a>
</div>

</div>

</body>
</html>
