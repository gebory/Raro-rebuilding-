<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RARO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#d4b06a;
font-family:Arial,sans-serif;
min-height:100vh;
}

.container{
max-width:700px;
margin:auto;
padding:80px 30px;
text-align:center;
}

.mark{
margin-bottom:40px;
}

.mark img{
width:140px;
height:auto;
display:block;
margin:auto;
}

.logo{
font-size:clamp(72px,12vw,120px);
font-weight:300;
letter-spacing:14px;
margin-bottom:40px;
}

.archive{
font-size:18px;
letter-spacing:8px;
margin-bottom:70px;
}

.description{
color:#d8d0c5;
font-size:20px;
line-height:2.2;
margin-bottom:80px;
}

.enter{
display:block;
width:100%;
padding:28px;
border:1px solid #b08d57;
color:#b08d57;
text-decoration:none;
letter-spacing:8px;
font-size:18px;
margin-bottom:100px;
transition:.3s;
}

.enter:hover{
background:rgba(176,141,87,.08);
}

.nav{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-bottom:50px;
}

.nav a{
color:#b08d57;
text-decoration:none;
letter-spacing:6px;
font-size:16px;
}

.instagram a{
color:#b08d57;
text-decoration:none;
letter-spacing:6px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="mark">
<img src="Images/Logo/00B72C45-AAB4-4D9D-A816-0C7C8D6F47F0.jpeg" alt="RARO Mark">
</div>

<div class="logo">
RARO
</div>

<div class="archive">
ARCHIVE OF MARKS
</div>

<div class="description">
Every piece begins as an idea.
<br><br>
Before it becomes a garment.
</div>

<a href="#" class="enter">
ENTER THE ARCHIVE
</a>

<div class="nav">
<a href="#">ARCHIVE</a>
<a href="#">ABOUT</a>
<a href="#">WAITLIST</a>
</div>

<div class="instagram">
<a href="#">INSTAGRAM</a>
</div>

</div>

</body>
</html>
